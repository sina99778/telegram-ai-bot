# ═══════════════════════════════════════════════
#  Alembic Configuration
# ═══════════════════════════════════════════════
# https://alembic.sqlalchemy.org/en/latest/

[alembic]

# Path to the migration scripts directory
script_location = alembic

# Ensure the project root is on sys.path so that
# "from app.core.config import settings" works inside env.py
prepend_sys_path = .

# Template used to generate migration filenames.
# Uses a date prefix for natural chronological ordering.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for file_template date stamps (optional)
# timezone =

# Max length of the "slug" portion of the filename
truncate_slug_length = 40

# Set to 'true' to run the environment during
# 'revision' to pick up newly-defined models automatically.
# revision_environment = false

# ── Logging ───────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
